<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - White Water Rafting Company</title>
    <meta name="description"
      content="Get in touch with White Water Rafting Company. Contact us for questions, bookings, or more information about our exciting rafting adventures.">
    <meta name="author" content="Francisco De Leon">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo-wwr.webp" alt="White Water Rafting logo">
        <div>
            <nav>
                <ul class="navigation">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="trips.html">Trips</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <div class="addrees">
            <!--<img src="images/rafting-2.webp" alt="Rafting team in action">-->
            <h1>White Water Rafting Company</h1>
            <p>123 Main river Street<br>
                Kolob, California<br>
                +1 999 999 9999<br>
                info@whitewater.com</p>
        </div>
        <div class="map-form">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d44398.89640399582!2d-90.51332367736067!3d15.260169281316385!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sgt!4v1780537863486!5m2!1sen!2sgt"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="right">
                <form>
                    <div>
                        <label for="q1" class="first">Name</label>
                        <input type="text" id="q1" name="q1">

                    </div>
                    <div>
                        <label for="q2" class="first">Email</label>
                        <input type="email" id="q2" name="q2">

                    </div>
                    <div class="rounds">
                        <p>Message Purpose</p>
                        <div class="rounds2">

                            <input type="radio" id="r1" name="purpose" value="general" required>
                            <label for="r1">General Inquiry</label>

                            <input type="radio" id="r2" name="purpose" value="reservation">
                            <label for="r2"> Reservation Question</label>

                            <input type="radio" id="r3" name="purpose" value="suggestion">
                            <label for="r3"> Website Suggestion</label>
                        </div>
                    </div>
                    <div>
                        <label for="q4">Message</label>
                        <textarea name="message" id="q4" placeholder="Type here"></textarea>

                    </div>
                    <div class="check-label">
                        <input class="square" type="checkbox" id="q5" name="suscribe">
                        <label for="q5"> Please Subscribe me to the monthyly newsletter</label>
                    </div>
                    <button type="submit">Send my message</button>
                </form>
            </div>
        </div>

        <section class="adventure">
            <h2>We are here to serve you</h2>
            <div>
                <figure>
                    <img src="images/employee11.webp" alt="Tom Holand">
                    <figcaption class="hero">Tom Holand</figcaption>
                </figure>
                <figure>
                    <img src="images/employee22.webp" alt="Richard Parker">
                    <figcaption class="hero">Richard Parker</figcaption>
                </figure>
                <figure>
                    <img src="images/employee33.webp" alt="Stuard Little">
                    <figcaption class="hero">Stuard Little</figcaption>
                </figure>
                <figure>
                    <img src="images/employee44.webp" alt="Aron Karter">
                    <figcaption class="hero">Aron Karter</figcaption>
                </figure>

            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 | White Water Rafting | Francisco De Leon</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.svg" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.svg" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.svg" alt="Instagram Icon">
            </a>
        </nav>

    </footer>
</body>

</html>
